<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rglr design</title>
    <style>
        /* --- STILE CSS --- */
        
        /* Reset di base per togliere margini predefiniti */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Impostazioni generali del testo */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Scorrimento fluido quando si clicca sui link */
        html {
            scroll-behavior: smooth;
        }

        /* --- BARRA DI NAVIGAZIONE (TOP BAR) --- */
        header {
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Leggera ombra */
            position: fixed; /* Fissa la barra in alto */
            width: 100%;
            top: 0;
            z-index: 1000; /* Assicura che stia sopra tutto */
        }

        nav {
            display: flex;
            justify-content: space-between; /* Spazia logo e menu */
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #222;
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px; /* Spazio tra le voci del menu */
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s ease;
            text-transform: uppercase; /* Rende il testo maiuscolo */
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: #007BFF; /* Colore al passaggio del mouse */
        }

        /* --- SEZIONI PRINCIPALI --- */
        main {
            margin-top: 80px; /* Spazio per non finire sotto la barra fissa */
        }

        section {
            padding: 100px 20px;
            min-height: 100vh; /* Ogni sezione occupa almeno l'altezza dello schermo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Colori di sfondo alternati per distinguere le sezioni */
        #works { background-color: #f9f9f9; }
        #concepts { background-color: #eef2f3; }
        #about { background-color: #ffffff; }

        h1 { font-size: 3rem; margin-bottom: 20px; }
        p { max-width: 600px; font-size: 1.2rem; color: #666; }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#" class="logo">rglr</a>

            <ul class="nav-links">
                <li><a href="#works">Works</a></li>
                <li><a href="#concepts">Concepts</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="works">
            <h1>Works</h1>
            <p>Qui puoi inserire la galleria dei tuoi progetti, casi studio o fotografie.</p>
        </section>

        <section id="concepts">
            <h1>Concepts</h1>
            <p>Questa sezione è ideale per le tue idee, bozze, filosofie di design o esperimenti.</p>
        </section>

        <section id="about">
            <h1>About</h1>
            <p>Racconta chi sei, la tua esperienza e come contattarti.</p>
        </section>
    </main>

</body>
</html>
