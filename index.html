<!DOCTYPE html>
<html lang="it">
  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rglr design - Portfolio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-search/dist/leaflet-search.min.css">

  
  <style>
    /* --- CARICAMENTO FONT PERSONALIZZATI --- */
    @font-face {
        font-family: 'Retroica';
        src: url('assets/fonts/retroica.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    @font-face {
        font-family: 'PlanetKosmos';
        src: url('assets/fonts/planetkosmos.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }    

    /* --- STILE CSS GENERALE --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        line-height: 1.6; 
        color: #fff; 
        background-color: #0f0f0f;
        overflow-x: hidden; 
    }
    
    html { scroll-behavior: smooth; }

    /* --- NAVBAR LIQUID GLASS --- */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(25, 25, 25, 0.7);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 2rem;
        z-index: 2000;
        height: 100px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.4s ease;
    }

    .navbar.collapsed { height: 65px; background: rgba(10, 10, 10, 0.85); }

    /* --- STILE DEL LOGO --- */
    #site-logo {
        position: absolute;
        height: 64px;
        width: auto;
        display: block;
        left: 2rem;
        top: 50%;
        transform: translateY(-50%);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
    }

    .navbar.collapsed #site-logo {
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
    }

    /* --- HAMBURGER MENU --- */
    .hamburger {
        display: flex; 
        cursor: pointer;
        z-index: 1002;
        flex-direction: column;
        gap: 5px;
        padding: 10px;
    }

    .hamburger span {
        display: block;
        width: 22px;
        height: 1.5px;
        background-color: white;
        transition: 0.3s;
    }

    .hamburger.is-active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.is-active span:nth-child(2) { opacity: 0; }
    .hamburger.is-active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* --- MENU OVERLAY --- */
    .nav-content {
        position: fixed;
        top: 0;
        right: -100%; /* Nascosto a destra */
        width: 100%;
        height: 100vh;
        background-color: #0f0f0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 50px;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
    }

    .nav-content.active {
        right: 0; /* Scivola dentro */
    }

    .nav-links {
        list-style: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-family: 'Retroica', serif;
        font-size: 3rem;
        letter-spacing: -1px;
    }

    .nav-links a:hover { opacity: 0.7; }

    .keep-in-touch {
        font-family: 'Retroica', serif;
        font-size: 0.75rem;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.7);
        width: 100%;
        text-align: center;
        margin-bottom: -20px;
    }

    /* --- SOCIAL LINKS NEL MENU --- */
    .social-links {
        display: flex;
        gap: 25px;
    }

    .social-links a {
        color: white;
        font-size: 2rem;
        transition: transform 0.2s;
    }

    .social-links a:hover { transform: scale(1.2); }

    /* --- MAPPA E SEZIONI --- */
    .map-header {
    margin-top: 120px; /* Spazio per la navbar */
    text-align: center;
    padding: 0 20px;
    margin-bottom: 16px;
    }

    .map-header h2 {
        font-family: 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 300; /* Spessore del carattere */
        color: #aaa;
        letter-spacing: 2px;
        font-size: 1rem;
    }

    #map-container { 
        width: 95%; 
        height: 50vh; 
        margin: 0 auto; 
        border-radius: 30px; 
        overflow: hidden; 
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        margin-bottom: 16px;
    }
    
    #map { width: 100%; height: 100%; background: #191919; }


    /* --- LEAFLET CUSTOM POPUP (LIQUID GLASS) --- */
    .leaflet-popup-content-wrapper {
        background: rgba(255, 255, 255, 0.05) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 20px !important;
        color: white !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
    }
    .leaflet-popup-tip { background: rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(12px) !important; }

    .popup-custom { text-align: center; max-width: 150px; cursor: pointer; }
    .popup-custom img { width: 80px; height: auto; margin-bottom: 8px; border-radius: 40px; margin-left: auto; margin-right: auto; display: block;}
    .popup-custom p { margin: 0; font-size: 0.9rem; font-weight: bold; color: #333;}

    /* --- PIN MAP ANIMATION --- */
    @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        60% { transform: scale(1.3); opacity: 1;stroke-width: 3px; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* Questa classe viene applicata ai path SVG di Leaflet */
    .anim-pin {
        filter: drop-shadow(0 0 8px rgba(228, 44, 29, 0.6));
        stroke: rgba(255, 255, 255, 0.5);
        stroke-width: 2px;
        transform-origin: center center;
        transform-box: fill-box; /* Essenziale per scalare gli SVG dal centro */
        animation: popIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* --- SEZIONI PRINCIPALI --- */
    section { padding: 80px 20px; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    #works { background-color: #333; }
    #concepts { background-color: #191919; }
    #about { background-color: #333; }
    h1 { 
        font-family: 'Retroica', serif; 
        font-size: 4rem; 
        margin-bottom: 20px; 
        font-weight: normal;
    }

    /* --- FOOTER COPYRIGHT --- */
    .footer-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: rgba(10, 10, 10, 0.9); /* Sfondo quasi trasparente */
        color: #999; /* Grigio molto leggero */
        text-align: center;
        padding: 8px 0;
        font-size: 0.65rem; /* Testo molto piccolo */
        text-transform: uppercase;
        letter-spacing: 2px;
        z-index: 999; /* Sotto l'overlay ma sopra i contenuti */
        border-top: 1px solid rgba(0,0,0,0.03);
        font-family: 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 200; /* Spessore del carattere */
    }
  </style>
</head>
<body>
    <nav class="navbar" id="mainNav">
        <a href="index.html" class="logo"> 
            <img src="assets/logo.png" alt="rglr" id="site-logo"> 
        </a>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
  
        <div class="nav-content" id="navContent">
            <ul class="nav-links">
                <li><a href="#works">Works</a></li>
                <li><a href="#concepts">Concepts</a></li>
                <li><a href="#about">About</a></li>
            </ul>

            <p class="keep-in-touch">keep in touch</p>

            <div class="social-links">
                <a href="https://instagram.com/rglrdesign" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/+393454811136" target="_blank" title="Contattami su WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="mailto:rglrdsgn@gmail.com" title="Invia una Mail"><i class="fas fa-envelope"></i></a>

            </div>
        </div>
    </nav>

    <div class="map-header">
        <h2>Explore my projects around the world</h2>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <main>
        <section id="works">
            <h1>Works</h1>
            <p>I dettagli delle maglie appariranno qui quando clicchi sulla mappa.</p>
        </section>
        <section id="concepts">
            <h1>Concepts</h1>
            <p>Area per le tue idee e bozze.</p>
        </section>
        <section id="about">
            <h1>About</h1>
            <p>Chi sono e contatti.</p>
        </section>
    </main>

    <footer class="footer-bar">
        &copy; <span id="year"></span> rglr design
    </footer>

    <script src="https://unpkg.com/leaflet-control-search/dist/leaflet-search.min.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
    <script>
        // Imposta l'anno corrente nel footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // --- LOGICA MENU ---
        const hamburger = document.getElementById('hamburger');
        const navContent = document.getElementById('navContent');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('is-active');
            navContent.classList.toggle('active');
            
            // Blocca lo scroll del body quando il menu è aperto
            document.body.style.overflow = navContent.classList.contains('active') ? 'hidden' : 'auto';
        });

        // Chiudi il menu cliccando su un link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('is-active');
                navContent.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });

        // --- SCROLL NAVBAR LOGIC ---
        let lastScrollTop = 0;
        const navbar = document.getElementById('mainNav');

        window.addEventListener("scroll", function() {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;

            // Se il menu è aperto, non collassare la barra
            if (navContent.classList.contains('active')) return;

            if (currentScroll > lastScrollTop && currentScroll > 50) {
                navbar.classList.add('collapsed');
            } else {
                navbar.classList.remove('collapsed');
            }
            lastScrollTop = currentScroll <= 0 ? 0 : currentScroll; 
        });

        // --- CONFIGURAZIONE MAPPA (Invariata) ---
        var map = L.map('map').setView([30, 10], 2);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
              maxZoom: 19,
              attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        var elencoSquadre = [
            { lat: 51.995, lng: 5.091, nome: "VV Vianen", link: "#works", logo: "assets/Vianen.jpg" },
            { lat: 14.599, lng: 120.984, nome: "Philippines National Mens Football Team", link: "#works", logo: "assets/Philippines.jpg" },
            { lat: -2.900, lng: -79.005, nome: "CD Cuenca Juniors", link: "#works", logo: "assets/CuencaJuniors.jpg" },
            { lat: 38.481, lng: 28.134, nome: "1984 Salihli Spor Kulübü", link: "#works", logo: "assets/Salihlispor.jpg" },
            { lat: -1.201, lng: 36.917, nome: "Kahawa Pride FC", link: "#works", logo: "assets/KahawaPride.jpg" },
            { lat: 7.961, lng: -80.428, nome: "Herrera FC", link: "#works", logo: "assets/HerreraFC.jpg" },
            { lat: 25.154, lng: 55.230, nome: "Phoenix City FC", link: "#works", logo: "assets/PhoenixFC.jpg" },
            { lat: 10.667, lng: -61.517, nome: "Trinidad & Tobago Bobsled Team", link: "#works", logo: "assets/TTBobsled.jpg" },
            { lat: 24.996, lng: 55.469, nome: "Duggan 7S", link: "#works", logo: "assets/Duggan7S.jpg" },
            { lat: 36.149, lng: -5.352, nome: "Magpies FCB", link: "#works", logo: "assets/MagpiesFCB.jpg" },
            { lat: 51.446, lng: -0.410, nome: "Feltham Town FC", link: "#works", logo: "assets/FelthamTown.jpg" },
            { lat: 51.470, lng: -0.454, nome: "No Tekk Army", link: "#works", logo: "assets/NoTekk.jpg" },
            { lat: 35.789, lng: -78.756, nome: "ZALA", link: "#works", logo: "assets/ZALA.jpg" },
            { lat: 51.385, lng: -0.414, nome: "Walton & Hersham FC", link: "#works", logo: "assets/WaltonHersham.jpg" },
            { lat: 25.204, lng: 55.270, nome: "Al Qabila FC", link: "#works", logo: "assets/AlQabila.jpg" },
            { lat: 43.653, lng: -79.383, nome: "Toronto KOI", link: "#works", logo: "assets/TorontoKOI.jpg" },
            { lat: 34.161, lng: -118.167, nome: "Zoe Suder Jersey", link: "#works", logo: "assets/ZoeSuder.jpg" },
            { lat: 14.083, lng: -60.951, nome: "Gros Islet Football League", link: "#works", logo: "assets/GrosIslet.jpg" }
        ];

        function aggiungiCerchio(squadra) {
            // Nota: ho aggiunto 'className' per attivare l'animazione CSS
            var circle = L.circleMarker([squadra.lat, squadra.lng], {
                color: '#e42c1d', 
                fillColor: '#e42c1d', 
                fillOpacity: 0.7, 
                radius: 6,
                className: 'anim-pin' // Aggiunge la classe animazione
            }).addTo(markersLayer);

            var contenutoPopup = `
                <div class="popup-custom" onclick="window.location.href='${squadra.link}'">
                    <img src="${squadra.logo}" alt="Logo ${squadra.nome}">
                    <p>${squadra.nome}</p>
                </div>
            `;
            circle.bindPopup(contenutoPopup, { offset: [0, -10], closeButton: false, autoPan: false });
            circle.on('mouseover', function() { this.openPopup(); this.setStyle({ radius: 10, fillOpacity: 1 }); });
            circle.on('mouseout', function() { this.closePopup(); this.setStyle({ radius: 6, fillOpacity: 0.7 }); });
            circle.on('click', function() { window.location.href = squadra.link; });
            circle.feature = {
                properties: {
                name: squadra.nome
                }
            };
        }

        var markersLayer = new L.LayerGroup().addTo(map);

        // --- ANIMAZIONE DI CARICAMENTO SEQUENZIALE ---
        // Itera sulla lista e aggiunge un ritardo per ogni elemento
        elencoSquadre.forEach((squadra, index) => {
            setTimeout(() => {
                aggiungiCerchio(squadra);
            }, index * 200); // 200ms di ritardo tra un pin e l'altro
        });

        var searchControl = new L.Control.Search({
            layer: markersLayer,
            propertyName: 'name',
            zoom: 6,
            initial: false,
            marker: false,
            position: 'topleft'
        });

        searchControl.on('search:locationfound', function(e) {
            e.layer.openPopup();
        });

map.addControl(searchControl);

    </script>
</body>
</html>
